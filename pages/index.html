<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BigSMILES Viewer</title>
<style>
/* ── Reset & base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  height: 100vh; display: flex; flex-direction: column;
  background: #f0f2f5; color: #222; overflow: hidden;
}

/* ── Header ───────────────────────────────────────── */
#header {
  display: flex; align-items: center; justify-content: space-between;
  height: 46px; padding: 0 20px;
  background: #1565c0; color: #fff; flex-shrink: 0;
  box-shadow: 0 2px 4px rgba(0,0,0,.3);
}
#header h1    { font-size: .95rem; font-weight: 600; letter-spacing: .02em; }
#user-badge   { font-size: .76rem; background: rgba(255,255,255,.18);
                padding: 3px 10px; border-radius: 20px; }

/* ── Main layout ──────────────────────────────────── */
#main { flex: 1; display: flex; overflow: hidden; }

/* ── Left panel ───────────────────────────────────── */
#left-panel {
  width: 25vw; min-width: 160px; flex-shrink: 0;
  background: #fff; border-right: 1px solid #ddd;
  display: flex; flex-direction: column; overflow: hidden;
}
#lp-header {
  padding: 10px 12px; flex-shrink: 0; border-bottom: 1px solid #eee;
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: #777;
}
#entry-list { flex: 1; overflow-y: auto; }
#entry-controls {
  padding: 8px 10px; border-bottom: 1px solid #eee;
  display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
}
#entry-search {
  width: 100%; border: 1px solid #ddd; border-radius: 4px;
  padding: 6px 8px; font-size: .76rem;
}
.entry-filter-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
}
.entry-filter-wide {
  grid-column: 1 / -1;
}
.entry-filter {
  display: flex; flex-direction: column; align-items: stretch; gap: 2px;
  font-size: .72rem; color: #666; text-transform: none; letter-spacing: 0;
}
.entry-filter select {
  min-width: 0; width: 100%; border: 1px solid #ddd; border-radius: 4px;
  padding: 5px 6px; font-size: .72rem; background: #fff; color: #222;
}
.entry-filter-check {
  flex-direction: row; align-items: center; gap: 6px;
  padding: 3px 0; font-weight: 700;
}
.entry-filter-check input { flex: 0 0 auto; }
.review-checkbox-list {
  display: flex; flex-direction: column; gap: 4px;
}
.entry-error-dropdown {
  position: relative; min-width: 0; width: 100%;
  color: #222;
}
.entry-error-dropdown summary {
  list-style: none; cursor: pointer; user-select: none;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  min-width: 0; width: 100%; border: 1px solid #ddd; border-radius: 4px;
  padding: 5px 6px; font-size: .72rem; background: #fff; color: #222;
}
.entry-error-dropdown summary::-webkit-details-marker { display: none; }
.entry-error-dropdown summary::after {
  content: "v"; flex: 0 0 auto; color: #777; font-size: .64rem;
}
.entry-error-dropdown[open] summary::after { content: "^"; }
.entry-error-summary {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.entry-error-menu {
  position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 20;
  display: flex; flex-direction: column; gap: 0;
  max-height: 172px; overflow: auto; padding: 4px;
  border: 1px solid #ddd; border-radius: 4px; background: #fff;
  box-shadow: 0 8px 22px rgba(0,0,0,.18);
}
.entry-error-menu label {
  display: flex; align-items: center; gap: 6px; min-width: 0;
  padding: 5px 6px; border-radius: 3px;
  font-size: .72rem; font-weight: 700; line-height: 1.25;
}
.entry-error-menu label:hover {
  background: #e3f2fd;
}
.review-check {
  display: flex; align-items: center; gap: 6px; min-width: 0;
  padding: 9px 12px; border-bottom: 1px solid #f4f4f4;
  font-size: .72rem; font-weight: 400; line-height: 1.25;
  cursor: pointer; transition: background .12s, color .12s;
}
.review-check:hover { background: #e3f2fd; }
.entry-error-menu input,
.review-check input {
  flex: 0 0 auto;
}
.entry-item {
  padding: 9px 12px; cursor: pointer;
  border-bottom: 1px solid #f4f4f4; transition: background .12s;
}
.entry-item:hover          { background: #e3f2fd; }
.entry-item.active         { background: #1565c0; color: #fff; }
.ei-head { display: flex; align-items: center; gap: 6px; min-width: 0; }
.ei-idx  { font-size: .78rem; font-weight: 700; }
.entry-item[data-last-modified="true"] .ei-idx,
.entry-item.active[data-last-modified="true"] .ei-idx { color: #f97316; }
.ei-bs   { font-size: .68rem; opacity: .6; white-space: nowrap;
           overflow: hidden; text-overflow: ellipsis; max-width: 184px; }
.entry-item.active .ei-bs  { opacity: .8; }
.bookmark-btn {
  border: 0; background: transparent; color: #999; cursor: pointer;
  flex: 0 0 auto; font-size: .84rem; line-height: 1; padding: 2px;
  opacity: .55; filter: grayscale(1);
}
.bookmark-btn.bookmarked { color: #f9a825; opacity: 1; filter: none; }

/* ── Right panel ──────────────────────────────────── */
#right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
#right-sidebar {
  display: flex; flex-direction: column; min-width: 0; overflow: hidden;
  background: #fff; border-top: 1px solid #ddd;
}
#error-modes-section {
  flex: 0 0 auto; padding: 8px 14px; border-bottom: 1px solid #eee;
}
.review-section-heading {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  margin-bottom: 7px;
}
.review-section-heading .review-section-title { margin-bottom: 0; }
.review-section-title {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: #777; margin-bottom: 7px;
}
#statistics-toggle { flex: 0 0 118px; }
.review-checkbox-list { gap: 0; }
.review-check-acceptable {
  margin-top: 0; border-radius: 0;
  transition: background .12s, color .12s;
}
.review-check-acceptable.selected {
  background: linear-gradient(90deg, rgba(31,111,235,.58), rgba(163,113,247,.44));
  color: #fff;
}
.review-divider {
  height: 1px; background: #eee; margin: 4px 0;
}

/* ── BigSMILES bar ────────────────────────────────── */
#bs-bar {
  background: #fff; border-bottom: 1px solid #ddd; padding: 8px 16px; flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
#bs-main { flex: 1 1 auto; min-width: 0; }
#bs-lbl  { font-size: .68rem; font-weight: 700; text-transform: uppercase;
           letter-spacing: .07em; color: #888; margin-bottom: 3px; }
#bs-text { font-family: 'Courier New', monospace; font-size: .87rem;
           color: #1565c0; word-break: break-all;
           max-height: 52px; overflow-y: auto; }
.mol-download-btn {
  flex: 0 0 auto; width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid rgba(88,166,255,.28); border-radius: 4px;
  background: rgba(88,166,255,.14); color: #dbeafe;
  cursor: pointer; transition: background .12s, border-color .12s, color .12s;
}
.mol-download-btn:hover { background: rgba(88,166,255,.22); }
.mol-download-btn:disabled { cursor: default; opacity: .45; }
.mol-download-btn[hidden] { display: none; }
.mol-download-glyph {
  position: relative; width: 16px; height: 16px; display: inline-block;
}
.mol-download-glyph::before {
  content: ""; position: absolute; left: 7px; top: 2px;
  width: 2px; height: 9px; background: currentColor;
}
.mol-download-glyph::after {
  content: ""; position: absolute; left: 4px; top: 7px;
  width: 8px; height: 8px; border-right: 2px solid currentColor;
  border-bottom: 2px solid currentColor; transform: rotate(45deg);
}

/* ── SVG area ─────────────────────────────────────── */
#svg-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

/* ── Toolbar ──────────────────────────────────────── */
#toolbar {
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  padding: 5px 12px; background: #fafafa; border: 1px solid #e0e0e0;
  flex-shrink: 0;
}
.tbtn {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 9px; font-size: .76rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 4px; background: #fff;
  color: #333; transition: background .12s, border-color .12s;
}
.tbtn:hover           { background: #e3f2fd; border-color: #1565c0; }
.tbtn.active          { background: #1565c0; color: #fff; border-color: #1565c0; }
.t-sep   { width: 1px; height: 20px; background: #ddd; margin: 0 2px; }

/* ── SVG wrapper & container ──────────────────────── */
#svg-wrapper {
  flex: 1; overflow: hidden;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 14px; background: #eef0f3; min-height: 0;
}
#svg-container {
  background: #fff; border-radius: 4px;
  box-shadow: 0 1px 6px rgba(0,0,0,.15);
  overflow: hidden; max-width: 100%;
}
#svg-container svg { display: block; width: 100%; height: 100%; }
#svg-placeholder {
  padding: 60px 40px; color: #bbb;
  font-size: .88rem; text-align: center;
}

/* ── Comments section ─────────────────────────────── */
#cmts-section {
  background: #fff; border-top: 1px solid #ddd;
  flex-shrink: 0; display: flex; flex-direction: column;
  height: 210px;
}
#cmts-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px; border-bottom: 1px solid #eee; flex-shrink: 0;
}
#cmts-title  { font-size: .7rem; font-weight: 700; text-transform: uppercase;
               letter-spacing: .07em; color: #777; }
#cmts-toggle { font-size: .72rem; color: #1565c0; background: none;
               border: none; cursor: pointer; }
#cmts-panel-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── Comment list ─────────────────────────────────── */
#cmts-history-list { flex: 1; overflow-y: auto; padding: 8px 14px; }
.cmt-card  {
  padding: 7px 10px; margin-bottom: 7px;
  background: #f8f9fa; border-radius: 6px;
  border-left: 3px solid #1565c0;
}
.cmt-meta  { font-size: .67rem; color: #888; margin-bottom: 3px; }
.cmt-meta strong { color: #1565c0; }
.cmt-text  { font-size: .77rem; color: #333; white-space: pre-wrap; }
.cmt-img   { max-width: 100%; max-height: 80px; margin-top: 5px;
             border-radius: 3px; cursor: pointer; border: 1px solid #eee; }

/* ── Add comment form ─────────────────────────────── */
#cmt-form  {
  width: 230px; min-width: 200px; border-left: 1px solid #eee;
  padding: 8px 10px; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}
#cmt-input {
  flex: 1; resize: none; border: 1px solid #ddd; border-radius: 4px;
  padding: 6px 8px; font-size: .77rem; font-family: inherit; min-height: 50px;
}
#cmt-file  { font-size: .7rem; }
#cmt-file::file-selector-button {
  color: #dbeafe; background: rgba(88,166,255,.14);
  border-color: rgba(88,166,255,.28);
  font-family: inherit; font-size: .76rem;
}
#cmt-file::-webkit-file-upload-button {
  color: #dbeafe; background: rgba(88,166,255,.14);
  border-color: rgba(88,166,255,.28);
  font-family: inherit; font-size: .76rem;
}
#cmt-thumb { max-width: 100%; max-height: 42px; display: none;
             object-fit: contain; border-radius: 3px; }
#post-btn,
#statistics-toggle {
  padding: 5px 0; background: rgba(88,166,255,.14); color: #dbeafe;
  border: 1px solid rgba(88,166,255,.28); border-radius: 4px; cursor: pointer;
  font-size: .77rem; font-weight: 600;
}
#post-btn:hover,
#statistics-toggle:hover { background: rgba(88,166,255,.22); }
#post-btn:disabled {
  background: rgba(58,70,88,.5); color: #aaa;
  border-color: rgba(170,170,170,.28); cursor: default;
}

/* ── Spinner ──────────────────────────────────────── */
.spin {
  width: 22px; height: 22px; margin: 20px auto;
  border: 3px solid #eee; border-top-color: #1565c0;
  border-radius: 50%; animation: sp .7s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }

/* ── Lightbox ─────────────────────────────────────── */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.78); z-index: 9999;
  align-items: center; justify-content: center;
}
#lightbox.on { display: flex; }
#lb-img      { max-width: 90vw; max-height: 90vh; border-radius: 6px; }
#lb-close    { position: fixed; top: 16px; right: 20px; color: #fff;
               font-size: 1.8rem; background: none; border: none;
               cursor: pointer; line-height: 1; }
/* Phase 1 visual foundation: dark grid layout */
:root {
  --bg: #0d1117;
  --panel: #161b22;
  --panel-2: #1f2633;
  --panel-3: #0f1724;
  --border: #30363d;
  --border-strong: #3f4b5f;
  --text: #e6edf3;
  --muted: #8b949e;
  --blue: #58a6ff;
  --blue-strong: #1f6feb;
  --purple: #a371f7;
  --danger: #ff7b72;
  --success: #3fb950;
  --splitter: #42526a;
  --shadow: 0 14px 36px rgba(0,0,0,.28);
}
html { font-size: 18px; }
body { background: var(--bg); color: var(--text); }
button, input, textarea { font: inherit; }
body.resizing-cols,
body.resizing-rows { user-select: none; }
body.resizing-cols { cursor: col-resize; }
body.resizing-rows { cursor: row-resize; }

#header {
  height: 48px; background: linear-gradient(90deg, #111827, #17122a);
  color: var(--text); border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 14px rgba(0,0,0,.35);
}
#header h1 { font-size: .95rem; font-weight: 650; letter-spacing: 0; }
#user-badge {
  color: #dbeafe; background: rgba(88,166,255,.14);
  border: 1px solid rgba(88,166,255,.28); border-radius: 999px;
  padding: 3px 10px; cursor: pointer;
}
#user-badge:hover { background: rgba(88,166,255,.22); }
#settings-panel {
  position: absolute; top: 54px; right: 12px; z-index: 20;
  width: 320px; padding: 12px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--panel); box-shadow: 0 14px 36px rgba(0,0,0,.35);
  display: grid; gap: 8px;
}
#settings-panel[hidden] { display: none; }
#settings-panel label {
  display: grid; gap: 3px; color: var(--muted); font-size: .72rem;
}
#settings-panel input {
  width: 100%; padding: 7px 8px; border: 1px solid var(--border);
  border-radius: 4px; background: #0f172a; color: var(--text);
}
#settings-panel .settings-actions {
  display: flex; justify-content: flex-end; gap: 8px;
}
#settings-panel button {
  padding: 5px 10px; border: 1px solid var(--border);
  border-radius: 4px; background: #1f2937; color: var(--text); cursor: pointer;
}
#settings-error {
  color: var(--danger); font-size: .72rem; line-height: 1.35;
}

#main {
  display: grid; grid-template-columns: auto minmax(0, 1fr);
  flex: 1; min-height: 0; height: calc(100vh - 48px); background: var(--bg);
}
#right-panel {
  --cmts-width: 25vw;
  --composer-height: 40vh;
  display: grid; grid-column: 2; min-width: 0; min-height: 0;
  height: 100%;
  grid-template-columns: minmax(360px, 1fr) var(--cmts-width);
  grid-template-rows: auto minmax(0, 1fr) minmax(128px, var(--composer-height));
}
#cmts-panel-body { display: flex !important; }
#cmts-panel-body[style*="none"] { display: none !important; }

#left-panel {
  grid-column: 1; grid-row: 1;
  width: 25vw; min-width: 170px; max-width: 34vw;
  background: var(--panel); border-right: 1px solid var(--splitter);
  overflow: auto; resize: none; position: relative;
}
#svg-area::after {
  content: ""; position: absolute; background: var(--splitter);
  opacity: .75; transition: opacity .12s, background .12s;
}
#left-resizer {
  position: absolute; top: 0; right: 0; bottom: 0; z-index: 3;
  width: 7px; background: var(--splitter); cursor: col-resize;
  touch-action: none;
  opacity: .75; transition: opacity .12s, background .12s;
}
#left-panel:hover #left-resizer,
#left-resizer:hover,
#svg-area:hover::after { opacity: 1; background: var(--blue); }
#lp-header {
  border-bottom-color: var(--border); color: var(--muted);
}
#entry-controls {
  background: var(--panel); border-bottom-color: var(--border);
}
#entry-search,
.entry-filter select,
.entry-error-dropdown summary {
  background: var(--panel-2); border-color: var(--border);
  color: var(--text);
}
#entry-search::placeholder { color: var(--muted); }
.entry-filter { color: var(--muted); }
.entry-error-dropdown summary::after { color: var(--muted); }
.entry-error-menu {
  background: var(--panel-2); border-color: var(--border);
  box-shadow: 0 8px 22px rgba(0,0,0,.35);
}
.entry-error-menu label,
.review-check { color: var(--text); }
.entry-error-menu label:hover { background: rgba(88,166,255,.14); }
.review-section-title { color: var(--muted); }
.review-divider { background: var(--border); }
.entry-item {
  border-bottom-color: rgba(48,54,61,.7);
  transition: background .12s, color .12s;
}
.entry-item:hover { background: rgba(88,166,255,.14); }
.entry-item.active {
  background: linear-gradient(90deg, rgba(31,111,235,.58), rgba(163,113,247,.44));
  color: #fff;
}
.entry-item.active .ei-bs { opacity: .9; }
.entry-item.active .bookmark-btn.bookmarked { color: #ffd33d; }
.bookmark-btn:hover { opacity: 1; color: #f2cc60; }
.bookmark-btn.bookmarked { color: #f2cc60; }

#bs-bar {
  grid-column: 1; grid-row: 1;
  background: var(--panel-3); border-bottom-color: var(--border);
  min-width: 0;
}
#bs-lbl { color: var(--muted); }
#bs-text { color: var(--blue); max-height: 56px; }
#svg-area {
  grid-column: 1; grid-row: 2;
  position: relative; background: var(--bg); overflow: hidden; min-height: 0;
}
#svg-area::after {
  top: 0; right: -3px; bottom: 0; width: 6px; cursor: col-resize; z-index: 2;
}

#toolbar {
  position: absolute; left: 50%; bottom: 12px; z-index: 5;
  transform: translateX(-50%);
  gap: 6px; padding: 7px 12px;
  background: var(--panel); border-bottom-color: var(--border);
  border: 1px solid var(--border); border-radius: 8px;
  box-shadow: var(--shadow);
  width: max-content; max-width: calc(100% - 24px);
}
.tbtn {
  gap: 4px; padding: 5px 11px; line-height: 1.2;
  border: 1px solid var(--border); border-radius: 6px;
  background: #21262d; color: var(--text);
  box-shadow: inset 0 -1px 0 rgba(0,0,0,.25);
  transition: background .12s, border-color .12s, color .12s, box-shadow .12s;
}
.tbtn:hover {
  background: #30363d; border-color: var(--blue); color: #fff;
}
.tbtn.active {
  background: var(--bg); color: var(--blue); border-color: var(--border-strong);
  box-shadow: inset 0 2px 0 var(--purple), 0 0 0 1px rgba(88,166,255,.12);
}
.t-sep { height: 24px; background: var(--border); }

#svg-wrapper {
  width: 100%; height: 100%; padding: 0; background: #0b1220;
  align-items: stretch; justify-content: stretch; touch-action: none;
}
#svg-container {
  width: 100%; height: 100%; background: #0b1220; border-radius: 0; box-shadow: none;
}
#svg-container svg { background: #0b1220; }
#svg-placeholder {
  color: var(--muted); background: var(--panel);
}

#right-sidebar {
  --cmts-history-height: 40vh;
  --error-modes-height: calc(100% - var(--cmts-history-height) - 7px);
  grid-column: 2; grid-row: 1 / 4;
  width: auto; min-width: 190px; max-width: none; height: auto;
  background: var(--panel); border-left: 1px solid var(--splitter);
  display: flex; flex-direction: column; overflow: hidden;
  direction: rtl; position: relative;
}
#error-modes-section {
  flex: 0 0 var(--error-modes-height); min-height: 72px;
  padding: 11px 12px 12px 14px; overflow: auto;
  border-bottom: 1px solid var(--border); background: var(--panel);
  direction: ltr;
}
#error-modes-list {
  display: flex; flex-direction: column; gap: 0;
  min-width: 0;
}
#cmts-section {
  flex: 1 1 auto; min-height: 0; height: auto;
  display: flex; flex-direction: column; overflow: hidden;
  direction: rtl; position: relative;
}
#cmts-resizer {
  position: absolute; top: 0; bottom: 0; left: 0; z-index: 3;
  width: 7px; background: var(--splitter); cursor: col-resize;
  touch-action: none;
  opacity: .75; transition: opacity .12s, background .12s;
}
#right-sidebar:hover #cmts-resizer,
#cmts-resizer:hover { opacity: 1; background: var(--blue); }
#error-cmts-resizer {
  flex: 0 0 7px; background: var(--splitter); cursor: row-resize;
  touch-action: none; opacity: .75; transition: opacity .12s, background .12s;
}
#right-sidebar:hover #error-cmts-resizer,
#error-cmts-resizer:hover { opacity: 1; background: var(--blue); }
#cmts-section.cmts-collapsed {
  flex: 0 0 auto; min-height: 0;
}
#cmts-section.cmts-collapsed #cmts-panel-body {
  display: none !important;
}
#cmts-section.cmts-collapsed #cmts-title {
  writing-mode: initial; transform: none;
}
#cmts-header {
  padding: 11px 12px 11px 14px; border-bottom: 1px solid var(--border);
  background: var(--panel); display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; direction: ltr; cursor: pointer;
}
#cmts-title {

<div id="settings-panel" hidden>

  <label>

  <label>

<!-- ══ Main ════════════════════════════════════════════════ -->

  <!-- Right panel -->

      <!-- Comment history -->

<!-- ══ JavaScript ═══════════════════════════════════════════ -->
<script src="config.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────
let currentIdx  = null;   // currently selected entry index
let imgB64      = null;   // pending comment image (base64)
let imgMime     = null;
let imgName     = null;
let cmtsOpen    = true;
let cmtsWidth   = Math.floor(window.innerWidth * 0.25);
let viewport    = { tx: 0, ty: 0, scale: 1 };
let baseViewBox  = null;
let panning      = false;
let panLast      = null;
let allEntries   = [];
let bookmarkedIndices = new Set();
let commentedIndices = new Set();
let entryErrorModes = new Map();
let entryUpdatedAt = new Map();
let lastModifiedIndices = new Set();
let selectedMol = '';
let selectedMolFileName = '';
let statisticsMode = false;
let statisticsData = null;
let statisticsLoading = false;
let statisticsError = '';
let statisticsRequestId = 0;

const ERROR_MODES = [
  { id: 'atom_overlap', label: 'Atom overlap' },
  { id: 'invalid_valence', label: 'Invalid valence' },
  { id: 'backbone_misplace', label: 'Backbone misplace' },
  { id: 'bracket_misplace', label: 'Bracket misplace' },
  { id: 'miscellaneous', label: 'Miscellaneous' },
  { id: 'suboptimal_bigsmiles', label: 'Suboptimal BIGSMILES' },
];
const ERROR_MODE_IDS = new Set(ERROR_MODES.map(mode => mode.id));

const API_CONFIG = window.VALIDATION_SITE_CONFIG || {};
const REVIEWER_NAME_KEY = 'validationReviewerName';
const REVIEWER_KEY_KEY = 'validationReviewKey';
const API_BASE_KEY = 'validationApiBaseUrl';

function apiBaseUrl() {
  return String(API_CONFIG.apiBaseUrl || localStorage.getItem(API_BASE_KEY) || '').replace(/\/+$/, '');
}

function apiAnonKey() {
  return String(API_CONFIG.anonKey || '');
}

function reviewerSettings() {
  return {
    name: localStorage.getItem(REVIEWER_NAME_KEY) || '',
    key: localStorage.getItem(REVIEWER_KEY_KEY) || '',
  };
}

function saveReviewerSettings(name, key, baseUrl) {
  localStorage.setItem(REVIEWER_NAME_KEY, String(name || '').trim());
  localStorage.setItem(REVIEWER_KEY_KEY, String(key || '').trim());
  if (baseUrl !== undefined && String(baseUrl || '').trim()) {
    localStorage.setItem(API_BASE_KEY, String(baseUrl).trim());
  }
  refreshReviewerUi();
}

function editReviewerSettings() {
  const current = reviewerSettings();
  document.getElementById('settings-name').value = current.name;
  document.getElementById('settings-key').value = current.key;
  document.getElementById('settings-api-base').value = apiBaseUrl();
  setReviewerSettingsError('');
  document.getElementById('settings-panel').hidden = false;
  return true;
}

function ensureReviewerSettings() {
  const current = reviewerSettings();
  if (!current.name || !current.key || !apiBaseUrl()) {
    editReviewerSettings();
    refreshReviewerUi();
    return false;
  }
  refreshReviewerUi();
  return true;
}

function closeReviewerSettings() {
  document.getElementById('settings-panel').hidden = true;
}

async function saveReviewerSettingsFromForm() {
  setReviewerSettingsError('');
  saveReviewerSettings(
    document.getElementById('settings-name').value,
    document.getElementById('settings-key').value,
    document.getElementById('settings-api-base').value,
  );
  try {
    await verifyReviewerKey();
    closeReviewerSettings();
    loadInitialData();
  } catch (err) {
    handleReviewerKeyError(err);
  }
}

function setReviewerSettingsError(message) {
  const el = document.getElementById('settings-error');
  if (!el) return;
  el.textContent = message || '';
  el.hidden = !message;
}

function handleReviewerKeyError(err) {
  const message = err && err.message ? err.message : String(err || 'Invalid validation key.');
  setReviewerSettingsError('Error: ' + message);
  document.getElementById('settings-panel').hidden = false;
  document.getElementById('entry-list').innerHTML =
    '<p style="padding:10px;color:#bbb;font-size:.78rem">Enter a valid reviewer key to load entries.</p>';
}

function refreshReviewerUi() {
  const settings = reviewerSettings();
  document.getElementById('user-badge').textContent =
    settings.name ? `Reviewer: ${settings.name}` : 'Set reviewer';
  const nameInput = document.getElementById('cmt-name');
  if (nameInput && settings.name && !nameInput.value) nameInput.value = settings.name;
}

async function apiRequest(path, options = {}) {
  const base = apiBaseUrl();
  if (!base) throw new Error('Validation API base URL is not configured.');

  const method = String(options.method || 'GET').toUpperCase();
  const headers = Object.assign({ Accept: 'application/json' }, options.headers || {});
  const anonKey = apiAnonKey();
  const settings = reviewerSettings();
  if (anonKey) {
    headers.apikey = anonKey;
    headers.Authorization = `Bearer ${anonKey}`;
  }
  if (settings.name) headers['x-reviewer-name'] = settings.name;
  if ((method !== 'GET' || options.requireValidationKey) && settings.key) {
    headers['x-validation-key'] = settings.key;
  }
  if (options.body !== undefined && !(options.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }

  const response = await fetch(base + path, Object.assign({}, options, { method, headers }));
  const contentType = response.headers.get('content-type') || '';
  const payload = contentType.includes('application/json') ? await response.json() : await response.text();
  if (!response.ok) {
    const message = payload && payload.error ? payload.error : `HTTP ${response.status}`;
    throw new Error(message);
  }
  return payload;
}

function apiGet(path) {
  return apiRequest(path);
}

function verifyReviewerKey() {
  return apiRequest('/me', { requireValidationKey: true });
}

function loadInitialData() {
  document.getElementById('entry-list').innerHTML = '<div class="spin"></div>';
  apiGet('/entries')
    .then(entries => {
      allEntries = entries || [];
      bookmarkedIndices = new Set(allEntries.filter(e => e.checked).map(e => String(e.index)));
      entryErrorModes = new Map(allEntries.map(e => [
        String(e.index),
        normalizeErrorModes(e.errorModes),
      ]));
      entryUpdatedAt = new Map(allEntries.map(e => [
        String(e.index),
        String(e.updatedAt || ''),
      ]));
      recomputeLastModifiedIndices();
      renderList(allEntries);
      loadCommentedIndices();
    })
    .catch(() => {
      document.getElementById('entry-list').innerHTML =
        '<p style="padding:10px;color:red;font-size:.78rem">Failed to load entries.</p>';
    });
}

// ── Boot ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (ensureReviewerSettings()) {
    verifyReviewerKey()
      .then(loadInitialData)
      .catch(handleReviewerKeyError);
  } else {
    document.getElementById('entry-list').innerHTML =
      '<p style="padding:10px;color:#bbb;font-size:.78rem">Enter reviewer settings to load entries.</p>';
  }

  /*
  // Fetch entry list
  apiGet('/entries')
    .then(entries => {
      allEntries = entries || [];
      renderList(allEntries);
      loadBookmarks();
      loadCommentedIndices();
    })
    .catch(() => {
      document.getElementById('entry-list').innerHTML =
        '<p style="padding:10px;color:red;font-size:.78rem">Failed to load entries.</p>';
    });
  */

  /*
  // Fetch user info
  legacy Apps Script user lookup
    .withSuccessHandler(u => {
      document.getElementById('user-badge').textContent = '👤 ' + u.email;
      document.getElementById('cmt-name').value = u.name || '';
    })
    .withFailureHandler(() => {
      document.getElementById('user-badge').textContent = '(unknown user)';
    })
    getCurrentUser removed.
  */

  // Fetch entry list
  /*
  apiGet('/entries')
    .then(entries => {
      allEntries = entries || [];
      renderList(allEntries);
      loadBookmarks();
      loadCommentedIndices();
    })
    .catch(() => {
      document.getElementById('entry-list').innerHTML =
        '<p style="padding:10px;color:red;font-size:.78rem">Failed to load entries.</p>';
    });
  */

  /*
  legacy Apps Script entry lookup
    .withSuccessHandler(entries => {
      allEntries = entries || [];
      renderList(allEntries);
      loadBookmarks();
      loadCommentedIndices();
    })
    .withFailureHandler(() => {
      document.getElementById('entry-list').innerHTML =
        '<p style="padding:10px;color:red;font-size:.78rem">Failed to load entries.</p>';
    })
    getEntries removed.
  */

  // Image preview listener
  document.getElementById('cmt-file').addEventListener('change', onFileChange);
  document.getElementById('entry-search').addEventListener(
    'keyup',
    debounce(filterEntries, 180)
  );
  document.getElementById('entry-search').addEventListener(
    'input',
    debounce(filterEntries, 180)
  );
  document.getElementById('comment-filter').addEventListener('change', filterEntries);
  document.getElementById('bookmark-filter').addEventListener('change', filterEntries);
  document.getElementById('last-modified-filter').addEventListener('change', filterEntries);
  document.addEventListener('keydown', onEntryNavKeydown);
  renderErrorFilter();
  renderErrorModePanel();
  initPanelResizers();
});

// ── Entry list ────────────────────────────────────────────────
function renderList(entries) {
  const el = document.getElementById('entry-list');
  if (!entries || !entries.length) {
    el.innerHTML = '<p style="padding:12px;color:#bbb;font-size:.78rem">' +
      'No entries yet.<br>Sync entries into Supabase.</p>';
    return;
  }
  el.innerHTML = entries.map(e => {
    const key = String(e.index);
    const isAcceptable = bookmarkedIndices.has(key);
    const modes = entryErrorModes.get(key) || [];
    const isLastModified = lastModifiedIndices.has(key);
    return `<div class="entry-item ${String(e.index) === currentIdx ? 'active' : ''}"
          data-idx="${esc(e.index)}"
          data-bookmarked="${isAcceptable ? 'true' : 'false'}"
          data-error-modes="${esc(modes.join(' '))}"
          data-last-modified="${isLastModified ? 'true' : 'false'}"
          data-has-comments="${commentedIndices.has(String(e.index)) ? 'true' : 'false'}"
          onclick="selectEntry('${esc(e.index)}')">
       <div class="ei-head">
         <div class="ei-idx">${esc(e.index)}</div>
       </div>
        <div class="ei-bs">${esc(e.bigsmiles)}</div>
      </div>`;
  }).join('');
  filterEntries();
}

function loadBookmarks() {
  apiGet('/entries/checked')
    .then(indices => {
      bookmarkedIndices = new Set((indices || []).map(String));
      renderList(allEntries);
    })
    .catch(err => console.error(err));
}

function loadCommentedIndices() {
  apiGet('/entries/commented')
    .then(indices => {
      commentedIndices = new Set((indices || []).map(String));
      renderList(allEntries);
    })
    .catch(err => console.error(err));
}

function toggleBookmark(idx) {
  const key = String(idx);
  const nextChecked = !bookmarkedIndices.has(key);
  apiRequest(`/entries/${encodeURIComponent(key)}/checked`, {
    method: 'PATCH',
    body: JSON.stringify({ checked: nextChecked }),
  })
    .then(r => {
      if (!r || !r.ok) {
        alert('Failed to update acceptable state.');
        return;
      }

      setEntryErrorModesLocal(key, r.errorModes || []);
      if (r.bookmarked || r.checked) bookmarkedIndices.add(key);
      else bookmarkedIndices.delete(key);
      applyUpdatedAtFromResponse(key, r.updatedAt);

      document.querySelectorAll('.entry-item').forEach(row => {
        if (row.dataset.idx === key) {
          setRowBookmarkState(row, bookmarkedIndices.has(key));
          setRowErrorModesState(row, entryErrorModes.get(key) || []);
          setRowLastModifiedState(row);
        }
      });
      renderErrorModePanel();
      filterEntries();
      refreshStatisticsAfterSave();
    })
    .catch(err => {
      alert('Error: ' + (err.message || err));
    });
}

function setRowBookmarkState(row, bookmarked) {
  row.dataset.bookmarked = bookmarked ? 'true' : 'false';
}

function setRowErrorModesState(row, modes) {
  row.dataset.errorModes = normalizeErrorModes(modes).join(' ');
}

function setRowLastModifiedState(row) {
  row.dataset.lastModified = lastModifiedIndices.has(String(row.dataset.idx || '')) ? 'true' : 'false';
}

function setEntryErrorModesLocal(idx, modes) {
  const key = String(idx);
  entryErrorModes.set(key, normalizeErrorModes(modes));
}

function setEntryUpdatedAtLocal(idx, updatedAt) {
  const key = String(idx);
  const value = String(updatedAt || '');
  entryUpdatedAt.set(key, value);
  const entry = allEntries.find(item => String(item.index) === key);
  if (entry) entry.updatedAt = value;
  recomputeLastModifiedIndices();
}

function parseUpdatedAtTimestamp(value) {
  const time = Date.parse(String(value || ''));
  return Number.isFinite(time) ? time : null;
}

function recomputeLastModifiedIndices() {
  let newest = null;
  const next = new Set();
  entryUpdatedAt.forEach((value, key) => {
    const time = parseUpdatedAtTimestamp(value);
    if (time === null) return;
    if (newest === null || time > newest) {
      newest = time;
      next.clear();
      next.add(key);
    } else if (time === newest) {
      next.add(key);
    }
  });
  lastModifiedIndices = next;
}

function refreshLastModifiedRows() {
  document.querySelectorAll('.entry-item').forEach(setRowLastModifiedState);
}

function applyUpdatedAtFromResponse(idx, updatedAt) {
  if (!updatedAt) return;
  setEntryUpdatedAtLocal(idx, updatedAt);
  refreshLastModifiedRows();
}

function normalizeErrorModes(modes) {
  if (!Array.isArray(modes)) return [];
  const unique = [];
  modes.forEach(mode => {
    const id = String(mode || '').trim();
    if (ERROR_MODE_IDS.has(id) && !unique.includes(id)) unique.push(id);
  });
  return unique;
}

function selectedErrorFilters() {
  return Array.from(document.querySelectorAll('.error-filter:checked'))
    .map(input => input.value)
    .filter(id => ERROR_MODE_IDS.has(id));
}

function updateErrorFilterSummary() {
  const summary = document.getElementById('error-filter-summary');
  if (!summary) return;
  const labels = selectedErrorFilters()
    .map(id => ERROR_MODES.find(mode => mode.id === id)?.label)
    .filter(Boolean);
  summary.textContent = labels.length ? labels.join(', ') : 'Any error mode';
}

function renderErrorFilter() {
  const container = document.getElementById('error-filter-list');
  if (!container) return;
  container.innerHTML = `
    <summary><span id="error-filter-summary" class="entry-error-summary">Any error mode</span></summary>
    <div class="entry-error-menu">
      ${ERROR_MODES.map(mode => `
        <label>
          <input class="error-filter" type="checkbox" value="${esc(mode.id)}">
          <span>${esc(mode.label)}</span>
        </label>
      `).join('')}
    </div>
  `;
  container.querySelectorAll('.error-filter').forEach(input => {
    input.addEventListener('change', () => {
      updateErrorFilterSummary();
      filterEntries();
    });
  });
  updateErrorFilterSummary();
}

function filterEntries() {
  const search = document.getElementById('entry-search');
  const commentFilter = document.getElementById('comment-filter');
  const bookmarkFilter = document.getElementById('bookmark-filter');
  const lastModifiedFilter = document.getElementById('last-modified-filter');
  const query = (search ? search.value : '').trim().toLowerCase();
  const commentMode = commentFilter ? commentFilter.value : 'any';
  const bookmarkMode = bookmarkFilter ? bookmarkFilter.value : 'any';
  const lastModifiedOnly = Boolean(lastModifiedFilter && lastModifiedFilter.checked);
  const errorFilters = selectedErrorFilters();

  document.querySelectorAll('#entry-list .entry-item').forEach(row => {
    const idx = (row.dataset.idx || '').toLowerCase();
    const matchesIndex = !query || idx.includes(query);
    const hasComments = row.dataset.hasComments === 'true';
    const bookmarked = row.dataset.bookmarked === 'true';
    const lastModified = row.dataset.lastModified === 'true';
    const rowErrorModes = (row.dataset.errorModes || '').split(/\s+/).filter(Boolean);
    const matchesComments =
      commentMode === 'any' ||
      (commentMode === 'has' && hasComments) ||
      (commentMode === 'none' && !hasComments);
    const matchesBookmark =
      bookmarkMode === 'any' ||
      (bookmarkMode === 'bookmarked' && bookmarked) ||
      (bookmarkMode === 'none' && !bookmarked);
    const matchesErrors =
      !errorFilters.length ||
      errorFilters.some(mode => rowErrorModes.includes(mode));
    const matchesLastModified = !lastModifiedOnly || lastModified;
    row.style.display =
      matchesIndex && matchesComments && matchesBookmark && matchesErrors && matchesLastModified
        ? ''
        : 'none';
  });
}

function onEntryNavKeydown(e) {
  if (!['ArrowDown', 'ArrowRight', 'ArrowUp', 'ArrowLeft'].includes(e.key)) return;
  if (isTypingTarget(e.target)) return;

  const rows = getVisibleEntryRows();
  if (!rows.length) return;

  const currentPos = rows.findIndex(row => row.dataset.idx === String(currentIdx));
  const delta = (e.key === 'ArrowDown' || e.key === 'ArrowRight') ? 1 : -1;
  let nextPos;
  if (currentPos === -1) {
    nextPos = delta > 0 ? 0 : rows.length - 1;
  } else {
    nextPos = clamp(currentPos + delta, 0, rows.length - 1);
  }

  const nextRow = rows[nextPos];
  if (!nextRow || nextRow.dataset.idx === String(currentIdx)) return;
  e.preventDefault();
  selectEntry(nextRow.dataset.idx);
  nextRow.scrollIntoView({ block: 'nearest' });
}

function getVisibleEntryRows() {
  return Array.from(document.querySelectorAll('#entry-list .entry-item'))
    .filter(row => row.style.display !== 'none');
}

function isTypingTarget(target) {
  if (!target) return false;
  return Boolean(
    target.isContentEditable ||
    (typeof target.closest === 'function' &&
      target.closest('input, textarea, select, button, [contenteditable]'))
  );
}

function debounce(fn, wait) {
  let timer = null;
  return function debounced(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), wait);
  };
}

function selectEntry(idx) {
  if (idx === currentIdx) return;

  // Highlight row
  document.querySelectorAll('.entry-item').forEach(el =>
    el.classList.toggle('active', el.dataset.idx === idx));

  // Reset view
  document.getElementById('bs-text').textContent = 'Loading…';
  document.getElementById('svg-container').innerHTML = '<div class="spin"></div>';
  setSelectedMol('', '');
  currentIdx = null;

  // Fetch full entry from server
  apiGet(`/entries/${encodeURIComponent(idx)}`)
    .then(onEntry)
    .catch(err => {
      document.getElementById('svg-container').innerHTML =
        '<div id="svg-placeholder" style="color:red">Error loading entry.</div>';
      console.error(err);
    });
}

function onEntry(entry) {
  if (!entry) {
    document.getElementById('bs-text').textContent = '(not found)';
    document.getElementById('svg-container').innerHTML =
      '<div id="svg-placeholder">Entry not found.</div>';
    return;
  }
  currentIdx = entry.index;
  const key = String(entry.index);
  if (entry.checked) bookmarkedIndices.add(key);
  else bookmarkedIndices.delete(key);
  setEntryErrorModesLocal(key, entry.errorModes || []);
  applyUpdatedAtFromResponse(key, entry.updatedAt);
  setSelectedMol(entry.mol || '', entry.molFileName || '');
  document.querySelectorAll('.entry-item').forEach(row => {
    if (row.dataset.idx === key) {
      setRowBookmarkState(row, bookmarkedIndices.has(key));
      setRowErrorModesState(row, entryErrorModes.get(key) || []);
      setRowLastModifiedState(row);
    }
  });
  renderErrorModePanel();
  filterEntries();

  // Show BIGSMILES
  document.getElementById('bs-text').textContent = entry.bigsmiles || '(no BIGSMILES)';

  // Load SVG + viewer controls
  loadSVG(entry.svg);

  // Load comments thread
  loadComments(entry.index);
  setFormEnabled(true);
}

// ── SVG loading ───────────────────────────────────────────────
// ── SVG loading (robust version) ──────────────────────────────
function setSelectedMol(mol, fileName) {
  selectedMol = String(mol || '');
  selectedMolFileName = String(fileName || '');
  updateMolDownloadButton();
}

function updateMolDownloadButton() {
  const btn = document.getElementById('mol-download-btn');
  if (!btn) return;
  const hasMol = Boolean(selectedMol.trim());
  btn.hidden = !hasMol;
  btn.disabled = !hasMol;
}

function safeMolFileName(fileName) {
  let name = String(fileName || '').trim()
    .replace(/[<>:"/\\|?*\x00-\x1f]/g, '_')
    .replace(/^\.+/, '')
    .slice(0, 160);
  if (!name) name = currentIdx ? `entry-${currentIdx}.mol` : 'entry.mol';
  if (!/\.mol$/i.test(name)) name += '.mol';
  return name;
}

function downloadSelectedMol(event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  if (!selectedMol.trim()) return;
  const blob = new Blob([selectedMol], { type: 'chemical/x-mdl-molfile' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = safeMolFileName(selectedMolFileName);
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

function loadSVG(svgStr) {
  const container = document.getElementById('svg-container');

  // ── Guard: empty / undefined / non-SVG ──────────────────────
  if (!svgStr || !svgStr.trim() || svgStr === 'undefined' || !svgStr.includes('<svg')) {
    container.innerHTML = '<div id="svg-placeholder">No SVG for this entry.</div>';
    return;
  }

  // ── Inject xmlns if missing ──────────────────────────────────
  if (!svgStr.includes('xmlns')) {
    svgStr = svgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
  }

  // ── Parse ────────────────────────────────────────────────────
  let svgEl;
  try {
    const doc = new DOMParser().parseFromString(svgStr, 'image/svg+xml');
    const err = doc.querySelector('parsererror');
    if (err) throw new Error(err.textContent);
    // ✅ importNode — adopt into current document before appending
    svgEl = document.importNode(doc.documentElement, true);
  } catch (e) {
    console.error('SVG parse error:', e);
    container.innerHTML =
      '<div id="svg-placeholder" style="color:red">SVG parse error — check browser console.</div>';
    return;
  }

  // ── Guarantee viewBox ────────────────────────────────────────
  let vbX = 0, vbY = 0, vbW, vbH;
  const vbAttr = svgEl.getAttribute('viewBox');
  if (vbAttr) {
    [vbX, vbY, vbW, vbH] = vbAttr.trim().split(/[\s,]+/).map(Number);
  } else {
    vbW = parseFloat(svgEl.getAttribute('width'))  || 800;
    vbH = parseFloat(svgEl.getAttribute('height')) || 600;
    svgEl.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
  }

  // ── Make responsive ──────────────────────────────────────────
  svgEl.setAttribute('width', '100%');
  svgEl.setAttribute('height', '100%');
  svgEl.style.display = 'block';

  // ── Hit-capture rect (always topmost) ────────────────────────
  const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  hit.id = 'svg-hit-rect';
  hit.setAttribute('x',      vbX);
  hit.setAttribute('y',      vbY);
  hit.setAttribute('width',  vbW);
  hit.setAttribute('height', vbH);
  hit.setAttribute('fill',   'transparent');
  hit.setAttribute('pointer-events', 'all');
  hit.style.cursor = 'grab';
  svgEl.appendChild(hit);

  // ── Bind viewer events ───────────────────────────────────────
  svgEl.addEventListener('wheel', onWheelZoom, { passive: false });
  svgEl.addEventListener('contextmenu', e => e.preventDefault());
  hit.addEventListener('mousedown', onPanStart);
  hit.addEventListener('mouseleave', onSvgLeave);

  // ── Insert into page ─────────────────────────────────────────
  container.innerHTML = '';
  container.appendChild(svgEl);
  initViewport();
}

// ── SVG coordinate helper ─────────────────────────────────────
// Converts screen px → SVG viewBox coordinates (handles zoom/scale)
function initViewport() {
  const svg = document.querySelector('#svg-container svg');
  if (!svg) return;
  const vb = svg.viewBox.baseVal;
  baseViewBox = { x: vb.x, y: vb.y, width: vb.width, height: vb.height };
  viewport = { tx: 0, ty: 0, scale: 1 };
  applyViewport();
}

function applyViewport() {
  const svg = document.querySelector('#svg-container svg');
  if (!svg || !baseViewBox) return;
  const width = baseViewBox.width / viewport.scale;
  const height = baseViewBox.height / viewport.scale;
  const x = baseViewBox.x + viewport.tx;
  const y = baseViewBox.y + viewport.ty;
  svg.setAttribute(
    'viewBox',
    `${x} ${y} ${width} ${height}`
  );
  const hit = document.getElementById('svg-hit-rect');
  if (hit) {
    hit.setAttribute('x', x);
    hit.setAttribute('y', y);
    hit.setAttribute('width', width);
    hit.setAttribute('height', height);
  }
  updateViewportCursor();
}

function onWheelZoom(e) {
  const svg = document.querySelector('#svg-container svg');
  if (!svg || !baseViewBox) return;
  e.preventDefault();

  const rect = svg.getBoundingClientRect();
  if (!rect.width || !rect.height) return;

  const cursor = svgPt(e);
  const relX = (e.clientX - rect.left) / rect.width;
  const relY = (e.clientY - rect.top) / rect.height;
  const factor = Math.exp(-e.deltaY * 0.0015);
  zoomAtPoint(cursor, relX, relY, factor);
}

function zoomViewport(factor) {
  const svg = document.querySelector('#svg-container svg');
  if (!svg || !baseViewBox) return;

  const rect = svg.getBoundingClientRect();
  if (!rect.width || !rect.height) return;

  const centerEvent = {
    clientX: rect.left + rect.width / 2,
    clientY: rect.top + rect.height / 2
  };
  zoomAtPoint(svgPt(centerEvent), 0.5, 0.5, factor);
}

function zoomAtPoint(anchor, relX, relY, factor) {
  const nextScale = clamp(viewport.scale * factor, 0.25, 12);
  const nextWidth = baseViewBox.width / nextScale;
  const nextHeight = baseViewBox.height / nextScale;

  viewport.scale = nextScale;
  viewport.tx = anchor.x - relX * nextWidth - baseViewBox.x;
  viewport.ty = anchor.y - relY * nextHeight - baseViewBox.y;
  applyViewport();
}

function onPanStart(e) {
  if (!baseViewBox || e.button !== 0) return;
  panning = true;
  panLast = { x: e.clientX, y: e.clientY };
  window.addEventListener('mousemove', onPanMove);
  window.addEventListener('mouseup', onPanEnd);
  updateViewportCursor();
  e.preventDefault();
}

function onPanMove(e) {
  if (!panning || !panLast || !baseViewBox) return;
  const svg = document.querySelector('#svg-container svg');
  if (!svg) return;
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  viewport.tx -= (e.clientX - panLast.x) * vb.width / rect.width;
  viewport.ty -= (e.clientY - panLast.y) * vb.height / rect.height;
  panLast = { x: e.clientX, y: e.clientY };
  applyViewport();
}

function onSvgLeave() {
  if (panning) onPanEnd();
}

function onPanEnd() {
  panning = false;
  panLast = null;
  window.removeEventListener('mousemove', onPanMove);
  window.removeEventListener('mouseup', onPanEnd);
  updateViewportCursor();
}

function resetView() {
  if (!baseViewBox) return;
  viewport = { tx: 0, ty: 0, scale: 1 };
  applyViewport();
}

function updateViewportCursor() {
  const hit = document.getElementById('svg-hit-rect');
  if (!hit) return;
  if (panning) hit.style.cursor = 'grabbing';
  else hit.style.cursor = 'grab';
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function svgPt(e) {
  const svg = document.querySelector('#svg-container svg');
  if (!svg) return { x: 0, y: 0 };
  const p = svg.createSVGPoint();
  p.x = e.clientX;
  p.y = e.clientY;
  const ctm = svg.getScreenCTM();
  return ctm ? p.matrixTransform(ctm.inverse()) : { x: 0, y: 0 };
}

// ── Comments ──────────────────────────────────────────────────
// Review state
function toggleStatisticsView() {
  statisticsMode = !statisticsMode;
  updateStatisticsToggle();
  if (statisticsMode) loadStatistics();
  else renderErrorModePanel();
}

function updateStatisticsToggle() {
  const button = document.getElementById('statistics-toggle');
  if (!button) return;
  button.textContent = statisticsMode ? 'show error modes' : 'show statistics';
  button.setAttribute('aria-pressed', statisticsMode ? 'true' : 'false');
}

function loadStatistics() {
  const requestId = ++statisticsRequestId;
  statisticsLoading = true;
  statisticsError = '';
  renderErrorModePanel();
  apiRequest('/statistics', { cache: 'no-store' })
    .then(data => {
      if (requestId !== statisticsRequestId) return;
      if (!data || !Array.isArray(data.categories)) {
        throw new Error('The backend returned an invalid statistics response.');
      }
      statisticsData = data;
      statisticsLoading = false;
      if (statisticsMode) renderErrorModePanel();
    })
    .catch(err => {
      if (requestId !== statisticsRequestId) return;
      statisticsLoading = false;
      statisticsError = err && err.message ? err.message : String(err);
      if (statisticsMode) renderErrorModePanel();
    });
}

function refreshStatisticsAfterSave() {
  if (statisticsMode) loadStatistics();
}

function formatPercentage(value) {
  const percentage = Number(value);
  if (!Number.isFinite(percentage)) return '0%';
  return percentage.toFixed(2).replace(/\.?0+$/, '') + '%';
}

function statisticsLinks() {
  const base = apiBaseUrl();
  if (!base) return '';
  return `
    <div class="statistics-actions">
      <button type="button" class="statistics-action" onclick="loadStatistics()">refresh</button>
      <a class="statistics-action" href="${esc(base + '/statistics')}" target="_blank"
         rel="noopener">view JSON</a>
      <a class="statistics-action" href="${esc(base + '/statistics.csv')}"
         download="validation-statistics.csv">download CSV</a>
    </div>
  `;
}

function renderStatisticsPanel(container) {
  if (statisticsLoading) {
    container.innerHTML = `
      <div class="statistics-status" role="status" aria-live="polite">
        <div class="spin"></div><span>Loading statistics...</span>
      </div>`;
    return;
  }
  if (statisticsError) {
    container.innerHTML = `
      <div class="statistics-status statistics-error" role="alert">
        <span>Statistics unavailable: ${esc(statisticsError)}</span>
        <button type="button" class="statistics-retry" onclick="loadStatistics()">retry</button>
      </div>`;
    return;
  }
  if (!statisticsData) {
    container.innerHTML = `
      <div class="statistics-status">
        <button type="button" class="statistics-retry" onclick="loadStatistics()">load statistics</button>
      </div>`;
    return;
  }

  const classified = Number(statisticsData.classifiedEntries) || 0;
  const total = Number(statisticsData.totalEntries) || 0;
  const categories = statisticsData.categories;
  const bars = categories.map((category, index) => {
    const rawPercentage = Number(category.percentage);
    const height = Number.isFinite(rawPercentage) ? clamp(rawPercentage, 0, 100) : 0;
    const tooltip = `${category.name}: ${formatPercentage(rawPercentage)}`;
    return `
      <button type="button" class="statistics-bar"
              aria-describedby="statistics-tooltip-${index}"
              aria-label="${esc(tooltip)}" style="--bar-height:${height}%">
        <span class="statistics-tooltip" id="statistics-tooltip-${index}" role="tooltip">${esc(tooltip)}</span>
        <span class="statistics-bar-fill" aria-hidden="true"></span>
      </button>`;
  }).join('');
  const labels = categories.map(category =>
    `<span title="${esc(category.name)}">${esc(category.abbreviation)}</span>`
  ).join('');
  const axisLabels = [100, 75, 50, 25, 0].map(value =>
    `<span style="bottom:${value}%">${value}%</span>`
  ).join('');

  container.innerHTML = `
    <div class="statistics-view">
      <div class="statistics-summary">
        <div class="statistics-chart-title" role="heading" aria-level="3">Classified ${classified}/${total}</div>
        ${statisticsLinks()}
      </div>
      ${classified === 0 ? '<div class="statistics-zero" role="status">No classified entries yet.</div>' : ''}
      <div class="statistics-chart-scroll" tabindex="0" aria-label="Error-rate chart; scroll horizontally if needed">
        <div class="statistics-chart">
          <div class="statistics-chart-grid">
            <div class="statistics-y-axis" aria-hidden="true">${axisLabels}</div>
            <div class="statistics-plot" role="group" aria-label="Classification percentages">${bars}</div>
            <div aria-hidden="true"></div>
            <div class="statistics-labels">${labels}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderErrorModePanel() {
  const container = document.getElementById('error-modes-list');
  if (!container) return;
  updateStatisticsToggle();
  if (statisticsMode) {
    renderStatisticsPanel(container);
    return;
  }
  if (!currentIdx) {
    container.innerHTML = '<span style="color:#ccc;font-size:.78rem">No entry selected.</span>';
    return;
  }

  const key = String(currentIdx);
  const modes = entryErrorModes.get(key) || [];
  const acceptable = bookmarkedIndices.has(key);
  const modeChecks = ERROR_MODES.map(mode => `
    <label class="review-check">
      <input type="checkbox"
             ${modes.includes(mode.id) ? 'checked' : ''}
             onchange="toggleErrorMode('${esc(mode.id)}', this.checked)">
      <span>${esc(mode.label)}</span>
    </label>
  `).join('');

  container.innerHTML = `
    <div class="review-checkbox-list">
      ${modeChecks}
      <div class="review-divider"></div>
      <label class="review-check review-check-acceptable ${acceptable ? 'selected' : ''}">
        <input type="checkbox"
               ${acceptable ? 'checked' : ''}
               onchange="setCurrentEntryAcceptable(this.checked)">
        <span>Acceptable</span>
      </label>
    </div>
  `;
}

function setCurrentEntryAcceptable(checked) {
  if (!currentIdx) return;
  const key = String(currentIdx);
  apiRequest(`/entries/${encodeURIComponent(key)}/checked`, {
    method: 'PATCH',
    body: JSON.stringify({ checked: Boolean(checked) }),
  })
    .then(r => {
      if (!r || !r.ok) {
        alert('Failed to update acceptable state.');
        renderErrorModePanel();
        return;
      }
      if (r.bookmarked || r.checked) {
        bookmarkedIndices.add(key);
      } else {
        bookmarkedIndices.delete(key);
      }
      setEntryErrorModesLocal(key, r.errorModes || []);
      applyUpdatedAtFromResponse(key, r.updatedAt);
      updateCurrentEntryReviewRows();
      refreshStatisticsAfterSave();
    })
    .catch(err => {
      alert('Error: ' + (err.message || err));
      renderErrorModePanel();
    });
}

function toggleErrorMode(modeId, enabled) {
  if (!currentIdx || !ERROR_MODE_IDS.has(modeId)) return;
  const key = String(currentIdx);
  const modes = new Set(entryErrorModes.get(key) || []);
  if (enabled) modes.add(modeId);
  else modes.delete(modeId);
  setCurrentEntryErrorModes(Array.from(modes));
}

function setCurrentEntryErrorModes(modes) {
  if (!currentIdx) return;
  const key = String(currentIdx);
  const normalized = normalizeErrorModes(modes);
  apiRequest(`/entries/${encodeURIComponent(key)}/error-modes`, {
    method: 'PATCH',
    body: JSON.stringify({ errorModes: normalized }),
  })
    .then(r => {
      if (!r || !r.ok) {
        alert('Failed to update error modes.');
        renderErrorModePanel();
        return;
      }
      const savedModes = normalizeErrorModes(r.errorModes);
      setEntryErrorModesLocal(key, savedModes);
      if (r.checked) bookmarkedIndices.add(key);
      else bookmarkedIndices.delete(key);
      applyUpdatedAtFromResponse(key, r.updatedAt);
      updateCurrentEntryReviewRows();
      refreshStatisticsAfterSave();
    })
    .catch(err => {
      alert('Error: ' + (err.message || err));
      renderErrorModePanel();
    });
}

function updateCurrentEntryReviewRows() {
  const key = String(currentIdx);
  document.querySelectorAll('.entry-item').forEach(row => {
    if (row.dataset.idx === key) {
      setRowBookmarkState(row, bookmarkedIndices.has(key));
      setRowErrorModesState(row, entryErrorModes.get(key) || []);
      setRowLastModifiedState(row);
    }
  });
  renderErrorModePanel();
  filterEntries();
}

function loadComments(idx) {
  const list = document.getElementById('cmts-history-list');
  list.innerHTML = '<div class="spin"></div>';
  apiGet(`/entries/${encodeURIComponent(idx)}/comments`)
    .then(renderComments)
    .catch(() => {
      list.innerHTML = '<p style="color:red;font-size:.76rem">Failed to load comments.</p>';
    });
}

function renderComments(cmts) {
  const list = document.getElementById('cmts-history-list');
  if (!cmts || !cmts.length) {
    list.innerHTML = '<span style="color:#ccc;font-size:.76rem">No comments yet — be the first!</span>';
    return;
  }
  list.innerHTML = cmts.map(c => `
    <div class="cmt-card" tabindex="0" role="button"
         onclick="toggleCommentCard(this)"
         onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCommentCard(this);}">
      <div class="cmt-meta">
        <strong>${esc(c.name)}</strong> &nbsp;·&nbsp; ${esc(c.timestamp)}
      </div>
      <div class="cmt-summary">${commentSummary(c)}</div>
      <div class="cmt-body">
        <div class="cmt-text">${esc(c.text)}</div>
        ${c.imageUrl
          ? `<img class="cmt-img" src="${esc(c.imageUrl)}" alt="attachment"
                 onclick="event.stopPropagation();openLB(this.src)">`
          : ''}
      </div>
    </div>`
  ).join('');
  list.scrollTop = list.scrollHeight;
}

function commentSummary(c) {
  const text = (c.text || '').trim();
  if (text) return esc(text.length > 80 ? text.slice(0, 77) + '...' : text);
  return c.imageUrl ? 'Image attachment' : 'Empty comment';
}

function toggleCommentCard(card) {
  card.classList.toggle('open');
}

function setFormEnabled(on) {
  ['cmt-name', 'cmt-input', 'cmt-file', 'post-btn'].forEach(id =>
    document.getElementById(id).disabled = !on);
}

function onFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  imgMime = file.type;
  imgName = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    const data = ev.target.result;
    imgB64 = data.split(',')[1];
    const th = document.getElementById('cmt-thumb');
    th.src = data; th.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function postComment() {
  if (!currentIdx) return;
  const composer = document.getElementById('cmt-form');
  const name = composer.querySelector('#cmt-name').value.trim();
  const text = composer.querySelector('#cmt-input').value.trim();
  if (!text && !imgB64) {
    alert('Please write a comment or attach an image.');
    return;
  }

  const btn = composer.querySelector('#post-btn');
  btn.disabled = true; btn.textContent = 'Posting…';

  apiRequest(`/entries/${encodeURIComponent(currentIdx)}/comments`, {
    method: 'POST',
    body: JSON.stringify({
      text,
      displayName: name,
      imgB64: imgB64 || '',
      imgMime: imgMime || '',
      imgName: imgName || '',
    }),
  })
    .then(r => {
      if (r && r.ok) {
        composer.querySelector('#cmt-input').value     = '';
        composer.querySelector('#cmt-file').value      = '';
        composer.querySelector('#cmt-thumb').style.display = 'none';
        imgB64 = imgMime = imgName = null;
        setRowCommentState(currentIdx, true);
        loadComments(currentIdx);
      } else {
        alert('Failed to post comment.');
      }
      btn.disabled = false; btn.textContent = 'Post Comment';
    })
    .catch(err => {
      alert('Error: ' + (err.message || err));
      btn.disabled = false; btn.textContent = 'Post Comment';
    });
}

function setRowCommentState(idx, hasComments) {
  const key = String(idx);
  if (hasComments) commentedIndices.add(key);
  else commentedIndices.delete(key);
  document.querySelectorAll('.entry-item').forEach(row => {
    if (row.dataset.idx === key) row.dataset.hasComments = hasComments ? 'true' : 'false';
  });
  filterEntries();
}

function initPanelResizers() {
  const main = document.getElementById('main');
  const leftPanel = document.getElementById('left-panel');
  const leftHandle = document.getElementById('left-resizer');
  const rightPanel = document.getElementById('right-panel');
  const rightSidebar = document.getElementById('right-sidebar');
  const errorModes = document.getElementById('error-modes-section');
  const errorCmtsHandle = document.getElementById('error-cmts-resizer');
  const cmts = document.getElementById('cmts-section');
  const cmtsHandle = document.getElementById('cmts-resizer');
  const form = document.getElementById('cmt-form');
  const formHandle = document.getElementById('cmt-form-resizer');

  leftHandle.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    leftHandle.setPointerCapture(e.pointerId);
    const startX = e.clientX;
    const startWidth = leftPanel.offsetWidth;
    document.body.classList.add('resizing-cols');

    const move = ev => {
      const maxWidth = Math.max(170, Math.floor(main.clientWidth * 0.34));
      const width = clamp(startWidth + ev.clientX - startX, 170, maxWidth);
      leftPanel.style.width = width + 'px';
    };
    const up = ev => {
      leftHandle.releasePointerCapture(ev.pointerId);
      leftHandle.removeEventListener('pointermove', move);
      leftHandle.removeEventListener('pointerup', up);
      leftHandle.removeEventListener('pointercancel', up);
      document.body.classList.remove('resizing-cols');
    };
    leftHandle.addEventListener('pointermove', move);
    leftHandle.addEventListener('pointerup', up);
    leftHandle.addEventListener('pointercancel', up);
  });

  cmtsHandle.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    rightSidebar.setPointerCapture(e.pointerId);
    const startX = e.clientX;
    const startWidth = rightSidebar.offsetWidth;
    document.body.classList.add('resizing-cols');

    const move = ev => {
      const maxWidth = Math.max(190, Math.floor(rightPanel.clientWidth * 0.55));
      const width = clamp(startWidth + startX - ev.clientX, 190, maxWidth);
      cmtsWidth = width;
      cmtsOpen = true;
      cmts.classList.remove('cmts-collapsed');
      rightPanel.style.setProperty('--cmts-width', width + 'px');
    };
    const up = ev => {
      rightSidebar.releasePointerCapture(ev.pointerId);
      rightSidebar.removeEventListener('pointermove', move);
      rightSidebar.removeEventListener('pointerup', up);
      rightSidebar.removeEventListener('pointercancel', up);
      document.body.classList.remove('resizing-cols');
    };
    rightSidebar.addEventListener('pointermove', move);
    rightSidebar.addEventListener('pointerup', up);
    rightSidebar.addEventListener('pointercancel', up);
  });

  errorCmtsHandle.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    errorCmtsHandle.setPointerCapture(e.pointerId);
    const startY = e.clientY;
    const startHeight = errorModes.offsetHeight;
    document.body.classList.add('resizing-rows');

    const move = ev => {
      const maxHeight = Math.max(72, rightSidebar.clientHeight - 120);
      const height = clamp(startHeight + ev.clientY - startY, 72, maxHeight);
      rightSidebar.style.setProperty('--error-modes-height', height + 'px');
    };
    const up = ev => {
      errorCmtsHandle.releasePointerCapture(ev.pointerId);
      errorCmtsHandle.removeEventListener('pointermove', move);
      errorCmtsHandle.removeEventListener('pointerup', up);
      errorCmtsHandle.removeEventListener('pointercancel', up);
      document.body.classList.remove('resizing-rows');
    };
    errorCmtsHandle.addEventListener('pointermove', move);
    errorCmtsHandle.addEventListener('pointerup', up);
    errorCmtsHandle.addEventListener('pointercancel', up);
  });

  formHandle.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    form.setPointerCapture(e.pointerId);
    const startY = e.clientY;
    const startHeight = form.offsetHeight;
    document.body.classList.add('resizing-rows');

    const move = ev => {
      const maxHeight = Math.max(118, Math.floor(rightPanel.clientHeight * 0.75));
      const height = clamp(startHeight + startY - ev.clientY, 118, maxHeight);
      rightPanel.style.setProperty('--composer-height', height + 'px');
    };
    const up = ev => {
      form.releasePointerCapture(ev.pointerId);
      form.removeEventListener('pointermove', move);
      form.removeEventListener('pointerup', up);
      form.removeEventListener('pointercancel', up);
      document.body.classList.remove('resizing-rows');
    };
    form.addEventListener('pointermove', move);
    form.addEventListener('pointerup', up);
    form.addEventListener('pointercancel', up);
  });
}

function toggleCmtsPanel() {
  cmtsOpen = !cmtsOpen;
  const cmts = document.getElementById('cmts-section');
  cmts.classList.toggle('cmts-collapsed', !cmtsOpen);
  document.getElementById('cmts-toggle').textContent = cmtsOpen ? 'hide' : 'show';
  document.getElementById('bs-bar').title = cmtsOpen
    ? 'Double-click to hide comments'
    : 'Double-click to show comments';
}

function clamp(n, min, max) {
  return Math.min(Math.max(n, min), max);
}

// ── Lightbox ──────────────────────────────────────────────────
function openLB(url) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lightbox').classList.add('on');
}
function closeLB() { document.getElementById('lightbox').classList.remove('on'); }

// ── HTML escape helper ────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
